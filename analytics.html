<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Telemetry Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  padding: 0;
  background: #0b0f17;
  font-family: 'Inter', sans-serif;
  color: #cbd5f5;
}

.container {
  width: 100%;
  height: calc(100vh - 70px);
  display: flex;
  flex-direction: column;
}

/* FULL WIDTH CONTENT */
.content {
  flex: 1;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* CARD FULL WIDTH */
.card {
  background: #111827;
  border: 1px solid #1f2937;
  border-radius: 6px;
  padding: 12px;
  width: 100%;
}

/* CHART FULL */
canvas {
  width: 100% !important;
  height: 320px !important;
}


/* LEGEND STYLE */
.chart-title {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
  font-weight: 600;
}

</style>
</head>

<body>

<div class="container">

 <div class="content">

    <div class="card">
      <h3>🔋 BATTERY VOLTAGE</h3>
      <canvas id="batteryChart"></canvas>
    </div>

    <div class="card">
      <h3>🌡 TEMPERATURE</h3>
      <canvas id="tempChart"></canvas>
    </div>

  </div>


</div>

<script>
// =======================
// SATELLITES
// =======================
const sats = [
  { name: "VINSAT-1", color: "#4ade80" },
  { name: "VINSAT-2", color: "#facc15" },
  { name: "VINSAT-3", color: "#60a5fa" },
  { name: "VINSAT-4", color: "#f97316" }
];

function createDatasets() {
  return sats.map(s => ({
    label: s.name,
    borderColor: s.color,
    data: [],
    borderWidth: 1.2,
    pointRadius: 0,
    tension: 0   // QUAN TRỌNG: không smooth
  }));
}

// INIT
const batteryChart = new Chart(
  document.getElementById("batteryChart"),
  {
    type: "line",
    data: {
      labels: [],
      datasets: createDatasets()
    },
    options: {
      animation: false,
      responsive: true,
      plugins: {
        legend: { labels: { color: "#cbd5f5" } }
      },
      scales: {
        y: {
          min: 0,
          max: 5,
          ticks: {
            color: "#94a3b8",
            callback: v => v + " V"
          }
        },
        x: { ticks: { display: false } }
      }
    }
  }
);

const tempChart = new Chart(
  document.getElementById("tempChart"),
  {
    type: "line",
    data: {
      labels: [],
      datasets: createDatasets()
    },
    options: {
      animation: false,
      responsive: true,
      plugins: {
        legend: { labels: { color: "#cbd5f5" } }
      },
      scales: {
        y: {
          min: 20,
          max: 90,
          ticks: {
            color: "#94a3b8",
            callback: v => v + "°C"
          }
        },
        x: { ticks: { display: false } }
      }
    }
  }
);

// =======================
// DATA “GIỐNG THẬT”
// =======================
function noisy(min, max) {
  let val = Math.random() * (max - min) + min;

  // thỉnh thoảng spike mạnh
  if (Math.random() < 0.1) {
    val = Math.random() * (max - min);
  }

  return val.toFixed(2);
}

function updateChart(chart, min, max) {

  chart.data.labels.push("");

  chart.data.datasets.forEach(ds => {
    ds.data.push(noisy(min, max));
  });

  if (chart.data.labels.length > 80) {
    chart.data.labels.shift();
    chart.data.datasets.forEach(ds => ds.data.shift());
  }

  chart.update("none");
}

// LOOP
setInterval(() => {
  updateChart(batteryChart, 2.5, 5);
  updateChart(tempChart, 30, 80);
}, 400);

</script>

</body>
</html>
