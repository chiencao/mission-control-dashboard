<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Telemetry Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  background: #0b0f17;
  font-family: 'Inter', sans-serif;
  color: #cbd5f5;
}

.container {
  padding: 20px;
}

h2 {
  margin-bottom: 10px;
  color: #e2e8f0;
}

/* CARD */
.card {
  background: #111827;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 8px;
}

/* CHART */
canvas {
  height: 300px !important;
}

/* LEGEND STYLE */
.chart-title {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
  font-weight: 600;
}

</style>
</head>

<body>

<div class="container">

  <!-- BATTERY -->
  <div class="card">
    <div class="chart-title">
      <div>🔋 Battery Voltage</div>
    </div>
    <canvas id="batteryChart"></canvas>
  </div>

  <!-- TEMPERATURE -->
  <div class="card">
    <div class="chart-title">
      <div>🌡 CPU Temperature</div>
    </div>
    <canvas id="tempChart"></canvas>
  </div>

</div>

<script>
// =======================
// SATELLITES
// =======================
const sats = [
  { name: "VINSAT-1", color: "#22c55e" },
  { name: "VINSAT-2", color: "#eab308" },
  { name: "VINSAT-3", color: "#60a5fa" },
  { name: "VINSAT-4", color: "#f97316" }
];

// =======================
// CREATE EMPTY DATASETS
// =======================
function createDatasets() {
  return sats.map(s => ({
    label: s.name,
    borderColor: s.color,
    data: [],
    tension: 0.3,
    pointRadius: 0
  }));
}

// =======================
// CHART INIT
// =======================
const ctx1 = document.getElementById("batteryChart").getContext("2d");
const ctx2 = document.getElementById("tempChart").getContext("2d");

const batteryChart = new Chart(ctx1, {
  type: "line",
  data: {
    labels: [],
    datasets: createDatasets()
  },
  options: {
    responsive: true,
    animation: false,
    scales: {
      y: {
        min: 0,
        max: 5,
        ticks: { color: "#94a3b8" }
      },
      x: { ticks: { display: false } }
    },
    plugins: {
      legend: { labels: { color: "#cbd5f5" } }
    }
  }
});

const tempChart = new Chart(ctx2, {
  type: "line",
  data: {
    labels: [],
    datasets: createDatasets()
  },
  options: {
    responsive: true,
    animation: false,
    scales: {
      y: {
        min: 20,
        max: 90,
        ticks: { color: "#94a3b8" }
      },
      x: { ticks: { display: false } }
    },
    plugins: {
      legend: { labels: { color: "#cbd5f5" } }
    }
  }
});

// =======================
// REALTIME UPDATE
// =======================
function updateChart(chart, min, max) {

  const time = new Date().toLocaleTimeString();

  chart.data.labels.push(time);

  chart.data.datasets.forEach(ds => {
    ds.data.push((Math.random() * (max - min) + min).toFixed(2));
  });

  // giới hạn 40 điểm
  if (chart.data.labels.length > 40) {
    chart.data.labels.shift();
    chart.data.datasets.forEach(ds => ds.data.shift());
  }

  chart.update();
}

// loop
setInterval(() => {
  updateChart(batteryChart, 2.5, 5);   // voltage
  updateChart(tempChart, 30, 80);      // temp
}, 1000);

</script>

</body>
</html>
