<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Telemetry Dashboard</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<!-- CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0b0f17;
  color: #cbd5f5;
  overflow: hidden; /* 🔥 disable scroll */
}

/* HEADER */
.header {
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  border-bottom: 1px solid #1f2937;
}

.logo {
  font-weight: 800;
  color: #38bdf8;
}

.nav-tabs {
  display: flex;
  gap: 10px;
}

.nav-link {
  color: #9ca3af;
  text-decoration: none;
  font-size: 12px;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 4px;
}

.nav-link.active {
  color: #3b82f6;
  background: rgba(59,130,246,0.1);
}

.nav-link:hover {
  background: #1f2937;
}

.status {
  font-size: 12px;
  color: #22c55e;
}

/* MAIN FULL SCREEN */
.container {
  height: calc(100vh - 70px);
  display: grid;
  grid-template-rows: 1fr 1fr; /* 🔥 2 chart chia đều */
  gap: 12px;
  padding: 12px;
  box-sizing: border-box;
}

/* CARD */
.card {
  background: #111827;
  border: 1px solid #1f2937;
  border-radius: 6px;
  padding: 10px;
  display: flex;
  flex-direction: column;
}

/* TITLE */
.card h3 {
  margin: 0 0 5px 0;
  font-size: 13px;
  color: #9ca3af;
}

/* CHART FULL */
canvas {
  flex: 1;
}

</style>
</head>

<body>

<!-- ✅ HEADER GIỮ NGUYÊN -->
<header class="header">
  <div class="logo">▲ VINSPACE MISSION CONTROL</div>
  
  <nav class="nav-tabs">
    <a href="index.html" class="nav-link">📡 TRACKING MAP</a>
    <a href="analytics.html" class="nav-link">📊 TELEMETRY CHART</a>
    <a href="commands.html" class="nav-link active">⚙️ COMMAND & PASSES</a>
  </nav>

  <div class="status">🟢 TRẠM VINUNIVERSITY GS-1: KẾT NỐI ỔN ĐỊNH</div>
</header>

<!-- ✅ FULL SCREEN 2 CHART -->
<div class="container">

  <div class="card">
    <h3>🔋 BATTERY VOLTAGE</h3>
    <canvas id="batteryChart"></canvas>
  </div>

  <div class="card">
    <h3>🌡 TEMPERATURE</h3>
    <canvas id="tempChart"></canvas>
  </div>

</div>

<script>
// =======================
// SATELLITES
// =======================
const sats = [
  { name: "VINSAT-1", color: "#4ade80" },
  { name: "VINSAT-2", color: "#facc15" },
  { name: "VINSAT-3", color: "#60a5fa" },
  { name: "VINSAT-4", color: "#f97316" }
];

function createDatasets() {
  return sats.map(s => ({
    label: s.name,
    borderColor: s.color,
    data: [],
    borderWidth: 1.2,
    pointRadius: 0,
    tension: 0 // 🔥 giống grafana (no smooth)
  }));
}

// =======================
// INIT CHART
// =======================
const batteryChart = new Chart(
  document.getElementById("batteryChart"),
  {
    type: "line",
    data: { labels: [], datasets: createDatasets() },
    options: {
      animation: false,
      plugins: {
        legend: { labels: { color: "#cbd5f5" } }
      },
      scales: {
        y: {
          min: 0,
          max: 5,
          ticks: {
            color: "#94a3b8",
            callback: v => v + " V"
          }
        },
        x: { ticks: { display: false } }
      }
    }
  }
);

const tempChart = new Chart(
  document.getElementById("tempChart"),
  {
    type: "line",
    data: { labels: [], datasets: createDatasets() },
    options: {
      animation: false,
      plugins: {
        legend: { labels: { color: "#cbd5f5" } }
      },
      scales: {
        y: {
          min: 20,
          max: 90,
          ticks: {
            color: "#94a3b8",
            callback: v => v + "°C"
          }
        },
        x: { ticks: { display: false } }
      }
    }
  }
);

// =======================
// REALISTIC NOISE DATA
// =======================
function noisy(min, max) {
  let val = Math.random() * (max - min) + min;

  // 🔥 random spike giống ảnh
  if (Math.random() < 0.15) {
    val = Math.random() * (max - min);
  }

  return val.toFixed(2);
}

function updateChart(chart, min, max) {

  chart.data.labels.push("");

  chart.data.datasets.forEach(ds => {
    ds.data.push(noisy(min, max));
  });

  if (chart.data.labels.length > 100) {
    chart.data.labels.shift();
    chart.data.datasets.forEach(ds => ds.data.shift());
  }

  chart.update("none");
}

// LOOP
setInterval(() => {
  updateChart(batteryChart, 2.5, 5);
  updateChart(tempChart, 30, 80);
}, 300);

</script>

</body>
</html>
