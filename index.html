<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>VinSpace SatOps</title>

  <!-- FONT -->
  <link href="https://googleapis.com" rel="stylesheet">
  
  <!-- ĐÃ SỬA: Gọi file CSS offline -->
  <link rel="stylesheet" href="leaflet.css" />

  <!-- STYLE -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="logo">▲ VINSPACE</div>
  <div class="status">🟢 TRẠM ĐÀ NẴNG GS-1: KẾT NỐI ỔN ĐỊNH</div>
</header>

<div class="container">
  <div class="left-panel">
    <div class="card">
      <h3>TRẠNG THÁI HỆ THỐNG</h3>
      <div class="circle">52%</div>
      <div class="stats">
        <div>Vệ tinh quỹ đạo: 02/02</div>
        <div class="green">HOẠT ĐỘNG</div>
        <div class="warning">Cảnh báo lỗi: 02</div>
      </div>
    </div>

    <div class="card">
      <h3>TRẠM MẶT ĐẤT (GS-1)</h3>
      <div class="green">ĐANG PHÁT</div>
      <div>Tx 14.25 GHz | 45W</div>
      <div class="speed">145.0 Mbps</div>
    </div>
  </div>

  <div class="main-panel">
    <div id="map"></div>
    <div class="log">
      <div>[SYSTEM] Init Dashboard...</div>
    </div>
  </div>
</div>

<!-- ĐÃ SỬA: Gọi file JS offline nằm TRÊN app.js -->
<script src="leaflet.js"></script>
<!-- APP JS -->
<script src="app.js"></script>

</body>
</html>
